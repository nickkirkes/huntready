# First serving CI (S08.1). Ingestion/Python CI is separate (pre-commit + local pytest baseline).
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  mcp-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_PASSWORD: postgres # pragma: allowlist secret
          POSTGRES_DB: huntready_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json
      - run: npm ci
      - run: npm run lint
      - name: Provision test Postgres (SELECT-only role + substrate)
        # All credentials here are throwaway values for the ephemeral localhost CI Postgres only.
        env:
          ADMIN_DSN: postgresql://postgres:postgres@localhost:5432/huntready_test # pragma: allowlist secret
          READONLY_PW: ci_readonly_pw # pragma: allowlist secret
        run: |
          psql "$ADMIN_DSN" -v ON_ERROR_STOP=1 -f tests/fixtures/ci-substrate.sql
          psql "$ADMIN_DSN" -v ON_ERROR_STOP=1 -f ../supabase/grant-readonly-role.sql
          psql "$ADMIN_DSN" -v ON_ERROR_STOP=1 -c "ALTER ROLE huntready_readonly PASSWORD '$READONLY_PW';"
      - run: npm run test:ci
        env:
          TEST_READONLY_DSN: postgresql://huntready_readonly:ci_readonly_pw@localhost:5432/huntready_test # pragma: allowlist secret
