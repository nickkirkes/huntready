# First serving CI (S08.1). Ingestion/Python CI is separate (pre-commit + local pytest baseline).
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  mcp-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test:ci
