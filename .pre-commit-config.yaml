# See https://pre-commit.com for more information
repos:
  # --- TypeScript type-checking ---
  - repo: local
    hooks:
      - id: tsc-mcp-server
        name: "tsc: mcp-server"
        entry: bash -c 'cd mcp-server && npx tsc --noEmit'
        language: system
        files: '^mcp-server/.*\.ts$'
        pass_filenames: false

      - id: tsc-web
        name: "tsc: web"
        entry: bash -c 'cd web && npx tsc --noEmit'
        language: system
        files: '^web/.*\.tsx?$'
        pass_filenames: false

  # --- Python lint ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.9
    hooks:
      - id: ruff
        args: [--fix]
        files: '^ingestion/'

  # --- Secrets scanning ---
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: 'package-lock\.json'
