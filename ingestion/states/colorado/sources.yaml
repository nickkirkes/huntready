# Colorado Parks & Wildlife (CPW) GIS sources (S05.1; CPW Big Game GMUs only).
#
# Each entry documents a CPW ArcGIS FeatureServer layer. Per ADR-014,
# `SourceCitation.publication_date` for `gis_layer` entries is `Jan 1 of
# REGYEAR` — derived at load time by `arcgis.build_source_citation(...)`
# from `license_year`. The runtime constructs the SourceCitation; this YAML
# is operator-facing documentation of intent (layer registry + agency +
# title + base URL + document_type). Update `note` after a known-good first
# fetch if attribute schema changes.
#
# Discovery outcomes: S05.3 found NO CWD-zone GIS layer (CPW manages CWD by
# hunt code/GMU — documented gap, no entry added; see cwd-source-discovery.md).
# S05.4 added the USGS PAD-US restricted-area entry below. A `pdfs:` top-level
# key remains reserved for future CPW PDFs (e.g., the Big Game brochure that
# would supply restricted-area verbatim_rule text in a later story).
#
# Service URL conventions:
#   - `service_url` is the FeatureServer base, WITHOUT the layer-id suffix.
#   - `layer_id` is the integer per the service catalog.
#   - The combined URL is `{service_url}/{layer_id}` and matches
#     `SourceCitation.url` constructed by `arcgis.build_source_citation`.

gis_layers:
  # id_template is documentation only — do NOT read this field at runtime.
  # The runtime SourceCitation.id is built by `arcgis.build_source_citation`
  # from `state_slug + service_url + layer_id + license_year`. Reading
  # `id_template` directly would write the unsubstituted `{license_year}`
  # placeholder to the database.
  - id_template: "co-cpw-arcgis-cpwadmindata-6-{license_year}"
    agency: "Colorado Parks and Wildlife"
    title: "Big Game GMUs (Layer 6 of CPWAdminData)"
    service_url: "https://services5.arcgis.com/ttNGmDvKQA7oeDQ3/ArcGIS/rest/services/CPWAdminData/FeatureServer"
    layer_id: 6
    document_type: gis_layer
    note: >
      Native EPSG:3857; outSR=4326 set in fetch params per arcgis.py.
      Last research-confirmed: 2026 epic-review pass; ~186 GMU polygons;
      attribute schema in docs/research/gmu-source-evaluation.md.
      No per-feature REGYEAR attribute — S05.2 passes license_year=2026
      (the fetch year) as the deliberate default per ADR-014.
  # id_template is documentation only — do NOT read this field at runtime.
  # The runtime SourceCitation.id is built by `arcgis.build_source_citation`
  # from `state_slug + service_url + layer_id + license_year`. Reading
  # `id_template` directly would write the unsubstituted `{license_year}`
  # placeholder to the database.
  - id_template: "co-usgs-padus-arcgis-Federal_Fee_Managers_Authoritative_PADUS-0-{license_year}"
    agency: "U.S. Geological Survey (PAD-US)"
    title: "PAD-US 4.1 Federal Fee Managers Authoritative (Layer 0)"
    service_url: "https://services.arcgis.com/v01gqwM5QqNysAAi/arcgis/rest/services/Federal_Fee_Managers_Authoritative_PADUS/FeatureServer"
    layer_id: 0
    document_type: gis_layer
    note: |
      Native EPSG:3857; outSR=4326 set in fetch params per arcgis.py.
      V1 WHERE clause: State_Nm='CO' AND ((NPS AND Des_Tp IN (NP,NM,NRA))
      OR (DOD AND Unit_Nm='United States Air Force Academy')).
      Curecanti NRA is fetched by the WHERE clause and dropped post-fetch
      (NPS NRAs permit hunting per 36 CFR §2.2), so 10 of the 11 fetched
      features are written.
      editingInfo.lastEditDate=2026-04-22 (live-probed 2026-06-03).
      Attribute schema documented in docs/research/colorado-restricted-areas-evaluation.md.
      license_year=2026 (fetch year) per ADR-014.
      verbatim_rule deferred for V1 — CPW Big Game brochure URL unresolved.

# CPW regulation PDFs (S06.1; URLs + SHA-256 + page counts resolved at S06.0/D4,
# operator-verified 2026-06-08). Mirrors the Montana `pdfs:` schema (S03.1).
#
# `expected_sha256` here is the operator's byte pin and is the AUTHORITATIVE
# drift gate per ADR-001 / E06 review finding #5. fetch_pdfs.py passes it to
# pdf_fetch.fetch_pdf, which enforces it on EVERY fetch — including the first,
# before any PDF/manifest is written — so a corrupt/wrong/stale first fetch
# cannot silently become the baseline (the S06.1 pin gate; a mismatch raises
# PdfFetchError). A SEPARATE manifest re-fetch gate also compares the observed
# SHA against the committed *-pdf-manifest.json and writes a
# <id>-<publication_date>-pending-reextraction.flag marker on drift. The HTTP
# `Last-Modified` header corroborates; a `Content-Length` delta with a MATCHING
# SHA-256 is benign (CDN re-compression / transfer-encoding variance) and must
# NOT raise.
#
# `publication_date` is the document's stated date, not the fetch date (Big Game
# brochure: HTTP Last-Modified "Wed, 04 Mar 2026"; correction PDF: its stated
# "Latest Update: February 19, 2026"). Confirmed by reading each PDF at S06.0,
# not inferred from the URL slug (S03.1 "slug ≠ cadence" pitfall).
#
# S06.4 scope note (ADR-019 doc-type-precedence merge): the 2026 corrections PDF
# is MOOSE-ONLY (two omitted moose hunt codes) — moose is out of V1 scope (V1
# species: elk, mule deer, whitetail, pronghorn, black bear), so the CO V1
# correction merge is expected to be a no-op. Registered now for provenance;
# confirm inert against the full 2-page extract at merge time.
pdfs:
  - id: co-cpw-big-game-2026-brochure
    agency: "Colorado Parks and Wildlife"
    title: "2026 Colorado Big Game Brochure (Deer, Elk, Pronghorn, Moose, Bear, Bison)"
    url: "https://spl.cde.state.co.us/artemis/nrserials/nr1431internet/nr14312026internet.pdf"
    expected_page_count: 84
    expected_sha256: "38cf26e1d0cdb930c38a9d18f04bbaced7c72a2573c86613c3ca5a9adb3582b3"  # pragma: allowlist secret
    document_type: annual_regulations
    publication_date: "2026-03-04"

  - id: co-cpw-big-game-2026-correction-2026-02-19
    agency: "Colorado Parks and Wildlife"
    title: "2026 Big Game Brochure Corrections (Latest Update: February 19, 2026)"
    url: "https://spl.cde.state.co.us/artemis/nrserials/nr1431internet/nr14312026corrinternet.pdf"
    expected_page_count: 2
    expected_sha256: "8eddff7011d3c25ee3b119a3dacf46e5ff9028555051423972a80b1c9371dbf0"  # pragma: allowlist secret
    document_type: correction
    publication_date: "2026-02-19"
