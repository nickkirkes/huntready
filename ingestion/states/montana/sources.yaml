# Montana FWP regulation PDFs (S03.1)
#
# Each entry carries the full SourceCitation field set used by downstream
# stories (S03.3-S03.5 extraction; S03.6+ ingestion). The `expected_sha256`
# field is documentation/intent — drift detection at runtime compares the
# observed SHA against the prior committed *-pdf-manifest.json, NOT against
# this field. Update `expected_sha256` here after a known-good first fetch
# so reviewers can spot intent drift in `git diff`.
#
# URL `binaries` paths are MT FWP CDN-hosted and are typically stable across
# the cycle but should be re-verified at execution time. The black bear
# correction URL is TBD as of 2026-05-04 — its entry carries `pending: true`
# so fetch_pdfs.py reports it distinctly in the final aggregated error
# (rather than as a misleading "fetch error"), but the orchestrator still
# exits non-zero until every canonical entry has been fetched. Exiting 0
# against an incomplete set would mislead downstream extraction stories.
# When the correction URL is located, set `url:` and remove `pending: true`.

pdfs:
