# Montana FWP regulation PDFs (S03.1; URLs corrected 2026-05-07)
#
# Each entry carries the full SourceCitation field set used by downstream
# stories (S03.3-S03.5 extraction; S03.6+ ingestion). The `expected_sha256`
# field is documentation/intent — drift detection at runtime compares the
# observed SHA against the prior committed *-pdf-manifest.json, NOT against
# this field. Update `expected_sha256` here after a known-good first fetch
# so reviewers can spot intent drift in `git diff`.
#
# URLs verified live 2026-05-07 against fwp.mt.gov/hunt/regulations (HEAD →
# 200 application/pdf for all four entries). FWP's actual file naming did
# not match the patterns assumed in S03.1's spec table — see commit message
# for the slug-vs-spec mismatch and the new "URL slug ≠ publication cadence"
# pitfall in `.roughly/known-pitfalls.md`.
#
# `publication_date` values are sourced from each PDF's HTTP `Last-Modified`
# header at URL-pinning time. The correction's date (2026-03-18) drives
# S03.4's per-cell date-arbitration; booklet dates (2026-04-27, 2026-02-03)
# anchor those too in case future M2 corrections collide.

