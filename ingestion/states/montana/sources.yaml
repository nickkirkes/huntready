    agency: Montana Fish, Wildlife & Parks
    title: "Deer, Elk, Antelope Hunting Regulations 2026-2027"
    url: "https://fwp.mt.gov/binaries/content/assets/fwp/hunt/regulations/deer-elk-antelope-regulations-2026-2027.pdf"
    expected_page_count: 141
    expected_sha256: unknown
    document_type: annual_regulations
    publication_date: "2026-01-01"

